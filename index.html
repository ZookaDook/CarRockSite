<!DOCTYPE html>
<html lang="en">
<head>
    <title>OMDb Moive Search</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
</head>
<body>
   <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
    <!-- Popper needed for some Bootstrap components -->
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
    <!-- Bootstrap -->
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>   
    
    <div class="container jumbotron py-4 px-4">
        <h1 class="h1">OMDb Movie Search</h1>
        
        <!-- Top search area -->
        <form class="form-inline bm p-2">
            <!-- search bar-->
            <input id="searchBar" type="text" class="form-control mr-2" placeholder="Search Moive"/>
            
             <!-- dropdown -->
            <button class="btn btn-primary dropdown-toggle mr-2" type="button" id="searchTypeDropdown" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                Movie
            </button>
            <div class="dropdown-menu" aria-labelledby="dropdownMenuButton">
                <a class="dropdown-item active" href="#">Movie</a>
                <a class="dropdown-item" href="#">Series</a>
                <a class="dropdown-item" href="#">Episode</a>
            </div>
            
             <!-- search btn -->
            <button id="searchBtn" type="button" class="btn btn-primary">Search</button>
        </form>
        
        <hr>

        <!-- Containter for moive cards, cards for moives will go inside -->
        <div id="movieResults" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4"></div>
    </div>

    <!-- JSfile -->
     <script src="main.js"></script>
</body>
</html>
